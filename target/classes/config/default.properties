# Default configuration properties for the Lava Lamp Mood Widget
# Adjust the properties below to customize the widget's behavior and appearance

# Color settings
color.primary=#FF5733
color.secondary=#33FF57
color.background=#000000

# Animation settings
animation.speed=0.5
animation.smoothness=0.8

# Mouse proximity settings
mouse.proximity.effect=true
mouse.proximity.range=100

# Time-based color shift settings
time.color.shift.enabled=true
time.color.shift.morning=#FFCC33
time.color.shift.afternoon=#33CCFF
time.color.shift.evening=#FF33CC

# General settings
widget.opacity=0.8
widget.position.x=100
widget.position.y=100
widget.size.width=300
widget.size.height=300

# Debug settings
debug.mode=false
debug.log.file=logs/debug.log